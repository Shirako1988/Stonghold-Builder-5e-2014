  <style>
    body {
      background-color: #8b6a40;
      background-image:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 10px),
        repeating-linear-gradient(-45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 10px);
      min-height: 100vh;
    }
    .dark body {
      background-color: #1a1a2e;
    }

    .font-medieval {
      font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif;
    }
    .font-cinzel {
      font-family: 'Cinzel', Georgia, serif;
    }

    .tab-content-animation {
      animation: fadeIn 0.25s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #6b4c2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #8b6340; }

    .dark ::-webkit-scrollbar-thumb { background: #c9a84c; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #e0c070; }

    /* ─── Print Styles ──────────────────────────────────────────── */
    @media print {
        /* Hide everything except the print template */
        body > * { display: none !important; }
        #stronghold-print-template { display: block !important; }

        body {
            background: white !important;
            background-image: none !important;
            color: #1a1a1a !important;
            font-family: Georgia, serif;
            font-size: 11pt;
            margin: 0;
            padding: 0;
        }

        #stronghold-print-template {
            display: block;
            padding: 1.2cm 0.8cm;
            max-width: 100%;
        }

        .print-header {
            text-align: center;
            border-bottom: 3px double #6b4c2a;
            padding-bottom: 12pt;
            margin-bottom: 16pt;
        }
        .print-header h1 {
            font-size: 24pt;
            font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif;
            color: #4a3018;
            margin: 0 0 4pt 0;
            letter-spacing: 2px;
        }
        .print-header .print-subtitle {
            font-size: 10pt;
            color: #6b4c2a;
            font-style: italic;
        }

        .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16pt; margin-bottom: 16pt; }
        .print-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12pt; margin-bottom: 16pt; }

        .print-section {
            border: 1.5pt solid #6b4c2a;
            border-radius: 4pt;
            overflow: hidden;
            margin-bottom: 14pt;
            page-break-inside: avoid;
        }
        .print-section-header {
            background: #6b4c2a;
            color: white;
            font-family: 'Cinzel', Georgia, serif;
            font-size: 10pt;
            font-weight: bold;
            padding: 5pt 10pt;
            letter-spacing: 1px;
        }
        .print-section-body { padding: 8pt 10pt; }

        .print-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 0.5pt solid #d4b896;
            padding: 3pt 0;
            font-size: 10pt;
        }
        .print-row:last-child { border-bottom: none; }
        .print-row .label { color: #4a3018; }
        .print-row .value { font-weight: bold; color: #1a1a1a; }
        .print-row .value.red { color: #b91c1c; }
        .print-row .value.green { color: #166534; }

        .print-total-row {
            display: flex;
            justify-content: space-between;
            border-top: 2pt solid #6b4c2a;
            padding-top: 5pt;
            margin-top: 3pt;
            font-size: 12pt;
            font-weight: bold;
        }

        .print-item {
            border-bottom: 0.5pt solid #e8d9c0;
            padding: 3pt 0;
            font-size: 9.5pt;
        }
        .print-item:last-child { border-bottom: none; }
        .print-item .item-name { font-weight: bold; color: #4a3018; }
        .print-item .item-custom { color: #6b4c2a; font-style: italic; }
        .print-item .item-detail { color: #666; font-size: 9pt; }

        .print-perk {
            display: inline-block;
            border: 1pt solid #6b4c2a;
            border-radius: 3pt;
            padding: 2pt 6pt;
            margin: 2pt;
            font-size: 9pt;
            color: #4a3018;
        }
        .print-perk.active { background: #f0dfc0; font-weight: bold; }
        .print-perk.inactive { color: #aaa; border-color: #ccc; }

        .print-finance-box {
            border: 1.5pt solid #6b4c2a;
            border-radius: 4pt;
            padding: 10pt;
            text-align: center;
            margin-bottom: 14pt;
        }
        .print-net-income {
            font-size: 18pt;
            font-weight: bold;
            font-family: 'Cinzel', Georgia, serif;
        }
        .print-footer {
            text-align: center;
            font-size: 8pt;
            color: #999;
            border-top: 1pt solid #d4b896;
            padding-top: 8pt;
            margin-top: 16pt;
        }
        .print-badge {
            display: inline-block;
            background: #f0dfc0;
            border: 1pt solid #c9a84c;
            border-radius: 3pt;
            padding: 1pt 5pt;
            font-size: 8.5pt;
            color: #6b4c2a;
            margin-right: 4pt;
        }
        .print-damage-warning {
            background: #fef2f2;
            border: 1.5pt solid #dc2626;
            border-radius: 4pt;
            padding: 6pt 10pt;
            margin-bottom: 12pt;
            color: #991b1b;
            font-weight: bold;
            text-align: center;
        }
        @page {
            margin: 1.5cm 1cm;
            size: A4;
        }
        @page :first {
            margin-top: 0;
        }
    }
    /* Hide print template in normal view */
    #stronghold-print-template { display: none; }

    /* Globale Textfarbe für Dark Mode – verhindert schwarzen Text auf dunklem Hintergrund */
    .dark body { color: #fdf3e0; }
    .dark select { color: #fdf3e0; }
    .dark input[type="text"],
    .dark input[type="number"],
    .dark input[type="date"] { color: #fdf3e0; }
    /* Standard-Text in dunklen Containern */
    .dark p, .dark span, .dark li, .dark td, .dark th, .dark label {
      color: inherit;
    }
  </style>

const getSettlementLabel = (key) => {
    const parts = key.split('_');
    const settlementType = {
        smallTown: "Small Town",
        largeTown: "Large Town",
        smallCity: "Small City",
        largeCity: "Large City",
        metropolis: "Metropolis"
    };
    const distance = {
        under1: "< 1 mile",
        '1to16': "1-16 miles",
        '17to48': "17-48 miles",
        '49to112': "49-112 miles",
        '113plus': "> 113 miles"
    };
    return `${settlementType[parts[0]] || key} (${distance[parts[1]] || 'away'})`;
};

ignment (2nd level) als Ritual für Barden.","gamePhase":"early","isOp":false,"opNote":"","tags":["social","stealth","protection"],"requiresStaff":null,"spellEquivalent5e":"nondetection (adapted)","removable":false},{"name":"Consecrated Chapel","originalPrice3e":3000,"category":"social","description":"Ein geweihter Raum, der Untote schwächt.","flavorText":"Der Raum ist dauerhaft geweiht. Untote, die hier eintreten, erleiden die Konsequenzen. Der Altar muss einer Gottheit geweiht sein – der Raum verliert seine Kraft ohne ihn.","mechanicalEffect5e":"Der Raum ist dauerhaft geweiht (entspricht dem hallow-Effekt, abgeschwächt). Untote im Raum haben Nachteil bei Angriffen und Schadenswürfen. Kleriker haben Vorteil beim Turn Undead. Untote können hier nicht erschaffen oder beschworen werden. Muss einen Altar/Schrein enthalten. Ein unhallow-Effekt (oder Desecrate aus 3.5e) hebt den Effekt temporär auf.","price5e":3000,"pricingRationale":"Permanent hallow-light effect. In 5e ist hallow 5th level, aber ein reduzierter consecrate-Effekt ist angemessen.","gamePhase":"early","isOp":false,"opNote":"","tags":["magic","holy","undead"],"requiresStaff":null,"spellEquivalent5e":"hallow (reduced)","removable":false},{"name":"Desecrated Shrine","originalPrice3e":3000,"category":"social","description":"Ein entweihter Raum, der Untote stärkt.","flavorText":"Der Raum ist dauerhaft entweiht. Nekromanten schätzen diesen Raum, da ihre Untoten-Diener hier gestärkt werden. Ein Altar eines dunklen Patrons ist Pflicht.","mechanicalEffect5e":"Der Raum ist dauerhaft enteweiht (entspricht dem unhallow-Effekt, abgeschwächt). Untote im Raum haben Vorteil bei Angriffen und Schadenswürfen und +2 HP pro Hit Die. Kleriker haben Nachteil beim Turn Undead. Untote, die hier erschaffen werden, erhalten Bonus-HP. Muss einen Altar/Schrein enthalten. Ein hallow-Effekt hebt den Effekt temporär auf.","price5e":3000,"pricingRationale":"Permanent desecrate (2nd level). Standard-Preis für permanenten 2nd-level-Effekt.","gamePhase":"early","isOp":false,"opNote":"","tags":["magic","unholy","undead"],"requiresStaff":null,"spellEquivalent5e":"desecrate","removable":false},{"name":"Dishonest Chamber","originalPrice3e":3000,"category":"social","description":"Ein Raum, der Divinations-Zauber täuscht.","flavorText":"Wenn jemand versucht in diesen Raum zu spähen, zeigen die Divinations-Zauber falsche Ergebnisse. Ideal für Geheimarchive und Verhandlungsräume mit heiklen Inhalten.","mechanicalEffect5e":"Divination-Zauber, die Auren im Raum erkennen, zeigen falsche Ergebnisse an (zufällige andere Person/Gegenstand als Quelle der Aura). Ein Wisdom saving throw (DC 13) erlaubt dem Zauberwirker, den Effekt zu durchschauen.","price5e":3000,"pricingRationale":"Permanent misdirection (2nd level). Nützlich für politische Intrigen.","gamePhase":"early","isOp":false,"opNote":"","tags":["social","stealth","magic"],"requiresStaff":null,"spellEquivalent5e":"nondetection + misdirection","removable":false},{"name":"Ghastly Chamber","originalPrice3e":3000,"category":"security","description":"Ein Raum, der Eindringlinge lähmt und übel riecht.","flavorText":"Wer eintritt, wird gelähmt und verbreitet einen betäubenden Gestank. Am wirkungsvollsten in Kombination mit Wachen, die außerhalb warten.","mechanicalEffect5e":"Wer den Raum betritt, muss einen Constitution saving throw (DC 13) bestehen. Bei Misserfolg: Paralyzed für 1d6+2 Runden und stinkende Aura (Nachteil für alle innerhalb 3m) für die Dauer. Der Effekt-Bereich kann kleiner als der ganze Raum sein.","price5e":3000,"pricingRationale":"Permanent ghoul touch (2nd level necromancy). Gut als Falle mit Wachpersonal.","gamePhase":"early","isOp":false,"opNote":"","tags":["security","trap","paralysis"],"requiresStaff":null,"spellEquivalent5e":"ghoul touch (adapted)","removable":false},{"name":"Guardian Statue","originalPrice3e":3000,"category":"security","description":"Eine Statue, die einen Alarm auslöst.","flavorText":"Diese Statue sieht aus wie gewöhnliches Kunstwerk. Wenn sich jemand ohne Passwort nähert, ertönt ein Alarm – entweder als lauter Schrei (75%) oder als stiller mentaler Hinweis an den Burgherrn (25%).","mechanicalEffect5e":"Wirkt als permanentes alarm-Ritual (siehe PHB). Löst lautlosen mentalen Alarm beim Besitzer aus, wenn eine Kreatur Tiny oder größer den überwachten Bereich (1 Raum, ca. 400 sq ft) betritt ohne das Passwort zu nennen. Alternativ: Hörbarer Alarm (60 ft Reichweite, durch Türen/Wände gedämpft).","price5e":3000,"pricingRationale":"Alarm ist ein 1st-level Ritual in 5e. Permanent = 500 GP × Grad 1 × Caster Level 6. Passt zur 5e-Wirtschaft.","gamePhase":"early","isOp":false,"opNote":"","tags":["security","alarm","passive"],"requiresStaff":null,"spellEquivalent5e":"alarm (ritual)","removable":true},{"name":"Hall of Silence","originalPrice3e":3000,"category":"utility","description":"Ein Raum, in dem alle Geräusche unterdrückt werden.","flavorText":"Bibliotheken und Schlafgemächer profitieren von diesem Raum. Aber auch laute Orte wie eine Schmiede können so gedämpft werden, dass die Nachbarn endlich in Ruhe denken können.","mechanicalEffect5e":"Alle Geräusche im Raum werden unterdrückt (wie silence-Zauber). Ein Wisdom saving throw (DC 13) erlaubt einer Kreatur, normal zu sprechen und Zauber mit verbalen Komponenten zu wirken. Andere Geräusche bleiben gedämpft.","price5e":3000,"pricingRationale":"Permanent silence (2nd level). Ideal für Bibliotheken oder Geheimgespräche.","gamePhase":"early","isOp":false,"opNote":"","tags":["utility","stealth","magic"],"requiresStaff":null,"spellEquivalent5e":"silence","removable":false},{"name":"Hall of Truth","originalPrice3e":3000,"category":"social","description":"Ein Raum, in dem niemand lügen kann.","flavorText":"Wer hier lügen will, stellt fest, dass die Worte sich weigern. Die Betroffenen wissen, dass sie beeinflusst werden – also lassen sie sich nicht überrumpeln. Oft in Verhörräumen eingesetzt.","mechanicalEffect5e":"Kreaturen im Raum können keine wissentlichen Lügen sagen (Charisma saving throw DC 13, bei Misserfolg ist Lügen unmöglich). Die Kreatur ist sich des Effekts bewusst. Bei Verlassen und Wiedereintritt ist ein neuer Save nötig.","price5e":3000,"pricingRationale":"Permanent zone of truth (2nd level). Standard-Preis für permanenten 2nd-level-Effekt.","gamePhase":"early","isOp":false,"opNote":"","tags":["social","interrogation","enchantment"],"requiresStaff":null,"spellEquivalent5e":"zone of truth","removable":false},{"name":"Hole of Hiding","originalPrice3e":3000,"category":"security","description":"Eine extradimensionale Tasche im Deckenbereich.","flavorText":"An der Decke hängt ein Seil ins Nichts. Wer hinaufklettert, verschwindet in einem unsichtbaren extradimensionalen Versteck – ideal für acht Personen in der Not.","mechanicalEffect5e":"Ein permanenter Rope Trick-Effekt (5e PHB S. 272) in der Decke. Ein 1,5m × 3m × 3m großer extradimensionaler Raum, der bis zu 8 Kreaturen aufnehmen kann. Nach dem Hochziehen des Seils ist der Eingang unsichtbar. Kletterprobe DC 15 zum Einstieg.","price5e":3000,"pricingRationale":"Permanent rope trick (2nd level). Sehr nützlich für Verstecke.","gamePhase":"early","isOp":false,"opNote":"","tags":["security","hiding","extradimensional"],"requiresStaff":null,"spellEquivalent5e":"rope trick","removable":false},{"name":"Jester's Theater","originalPrice3e":3000,"category":"security","description":"Ein Raum, der unkontrollierbares Lachen auslöst.","flavorText":"Kein ehrlicher Unterhalter würde Magie nutzen um ein Lachen zu erzwingen. Dieser Raum ist meist eine Falle – mit Wachen nebenan, die auf das Lachen warten.","mechanicalEffect5e":"Beim Betreten: Wisdom saving throw (DC 13). Bei Misserfolg: Prone und incapacitated durch Lachen für 3 Runden. Nach Ablauf oder erfolgreichem Save: Immunität für die Dauer im Raum. Bei Verlassen und Wiedereintritt erneut sparen. Kreaturen mit Int 2 oder niedriger immun.","price5e":3000,"pricingRationale":"Permanent Tasha's hideous laughter (1st level). Klassische Falle.","gamePhase":"early","isOp":false,"opNote":"","tags":["security","trap","enchantment"],"requiresStaff":null,"spellEquivalent5e":"Tasha's hideous laughter","removable":false},{"name":"Pantry of Preservation","originalPrice3e":3000,"category":"utility","description":"Ein Vorratsraum, der Lebensmittel frisch hält.","flavorText":"Kein Fleisch verdirbt hier. Kein feines Gasthaus kommt ohne diese Kammer aus. Wird sie zur Aufbewahrung von Toten genutzt, nennt man sie 'Morgue der Bewahrung'.","mechanicalEffect5e":"Der Raum ist permanent mit gentle repose verzaubert. Tote Kreaturen und Lebensmittel verfallen nicht. Auch als Totenkammer nutzbar. Keine Aktion erforderlich.","price5e":3000,"pricingRationale":"Permanent gentle repose (2nd level ritual). Praktisch für jede Küche.","gamePhase":"early","isOp":false,"opNote":"","tags":["economic","food","utility"],"requiresStaff":null,"spellEquivalent5e":"gentle repose (ritual)","removable":false},{"name":"Stable of Understanding","originalPrice3e":3000,"category":"utility","description":"Ein Stall, in dem man mit Tieren sprechen kann.","flavorText":"Ein Pferd zu verstehen macht das Reiten deutlich effizienter. Nützlich für Stallmeister und Späher, die ihre Tiere als Informationsquelle nutzen möchten.","mechanicalEffect5e":"Kreaturen im Raum können mit Tieren (nicht Beasts, Magical Beasts oder Vermin) kommunizieren wie unter speak with animals. Der Effekt endet beim Verlassen des Raumes oder wenn das Tier den Raum verlässt.","price5e":3000,"pricingRationale":"Permanent speak with animals (1st level ritual). Nützlich für Stallmeister.","gamePhase":"early","isOp":false,"opNote":"","tags":["utility","communication","animals"],"requiresStaff":null,"spellEquivalent5e":"speak with animals (ritual)","removable":true},{"name":"Summoning Stone (II)","originalPrice3e":3000,"category":"security","description":"Ein Stein, der mäßig starke Kreaturen beschwört.","flavorText":"Ein gefährlicheres Wesen erscheint bei Annäherung. Wer die Festung kennt, umgeht diese Steine – wer sie nicht kennt, zahlt den Preis.","mechanicalEffect5e":"Beschwört eine celestiale/fiendische Kreatur CR 1/2 (z.B. Celestial Eagle, Fiendish Wolf) oder 1d3 CR 1/8 Kreaturen. Greift Eindringlinge an. 3x täglich. Passwort möglich.","price5e":3000,"pricingRationale":"Entspricht summon beast II / conjure animals. Stärkere Version von Typ I.","gamePhase":"early","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"summon beast II","removable":false},{"name":"Table of Freshness","originalPrice3e":3000,"category":"utility","description":"Ein Tisch, der verdorbenes Essen reinigt.","flavorText":"Selbst das ranzigste Brot wird auf diesem Tisch wieder genießbar. Ein unverzichtbares Stück für jeden Proviantmeister.","mechanicalEffect5e":"Jedes Essen oder Getränk, das auf den Tisch gestellt wird, wird automatisch von Verderbnis und Gift gereinigt (purify food and drink). Platz für 12 Personen.","price5e":3000,"pricingRationale":"Permanent purify food and drink (1st level ritual). Sehr nützlich für lange Reisen oder Belagerungen.","gamePhase":"early","isOp":false,"opNote":"","tags":["utility","food","safety"],"requiresStaff":null,"spellEquivalent5e":"purify food and drink (ritual)","removable":true},{"name":"Touchstone of Faith (II)","originalPrice3e":3000,"category":"combat","description":"Ein Stein, der +3 AC-Bonus gewährt.","flavorText":"Der Schutz ist nun stärker spürbar, fast wie eine unsichtbare zweite Rüstung.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält +3 magischer Bonus auf die Rüstungsklasse (stapelt nicht mit anderen magischen AC-Boni). Bei mehreren Kreaturen entfällt der Bonus.","price5e":3000,"pricingRationale":"Verbesserte Version von Typ I. +3 AC ist значend für mid-game.","gamePhase":"early","isOp":false,"opNote":"","tags":["combat","buff","defensive"],"requiresStaff":null,"spellEquivalent5e":"shield of faith (enhanced)","removable":true},{"name":"Touchstone of Safety (I)","originalPrice3e":3000,"category":"combat","description":"Ein Stein, der DR gegen Fernkampfangriffe gewährt.","flavorText":"Pfeile verlieren ihre Wucht gegen jemanden der hier steht. Ideal für den Bogenschützen in seiner Schussposition.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält Resistenz (halber Schaden) gegen ranged weapon damage. Bei mehreren Kreaturen entfällt der Bonus.","price5e":3000,"pricingRationale":"Entspricht protection from energy (3rd level) spezialisert auf Fernkampf.","gamePhase":"early","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (adapted)","removable":true},{"name":"Wondrous Absence","originalPrice3e":3000,"category":"security","description":"Verbirgt magische Auren in einem Raum.","flavorText":"Alle magischen Auren im Raum werden verborgen. Ideal für Schatzkammern und Geheimarchive mit mächtigen Objekten.","mechanicalEffect5e":"Alle magischen Auren im Raum sind für detect magic und ähnliche Zauber unsichtbar. Ein Intelligenz (Arkane Zauberkunde)-Wurf (DC 16) oder dispel magic (5th level+) kann den Effekt durchdringen.","price5e":3000,"pricingRationale":"Permanent nondetection-Basis oder Nystul's magic aura (2nd level).","gamePhase":"early","isOp":false,"opNote":"","tags":["security","stealth","magic"],"requiresStaff":null,"spellEquivalent5e":"Nystul's magic aura","removable":false},{"name":"Wondrous Whisperer","originalPrice3e":3000,"category":"utility","description":"Eine Konstruktion, die Nachrichten über den Wind sendet.","flavorText":"Man flüstert in die Öffnung – und Minuten später hört man es kilometerwei entfernt. Außenposten nutzen dies um Nachrichten zur Hauptburg zu senden.","mechanicalEffect5e":"Nachrichten bis zu 25 Wörter können an jeden bekannten Ort innerhalb von 5 Meilen gesendet werden (whispering wind). Der Wind braucht 10 Minuten pro Meile. Nachricht wird leise am Zielort gesprochen.","price5e":3000,"pricingRationale":"Permanent sending-light. In 5e ist sending 3rd level, whispering wind 2nd level.","gamePhase":"early","isOp":false,"opNote":"","tags":["utility","communication","messaging"],"requiresStaff":null,"spellEquivalent5e":"sending (reduced) / whispering wind","removable":false},{"name":"Hall of Speech","originalPrice3e":4000,"category":"utility","description":"Ein Raum, in dem man jede Sprache versteht und spricht.","flavorText":"Besonders nützlich in Kombination mit Scrying-Magie: Man kann nun nicht nur sehen sondern auch verstehen was ferne Personen sagen.","mechanicalEffect5e":"Kreaturen im Raum verstehen jede gesprochene Sprache und können selbst in jeder Sprache sprechen (tongues). Nützlich in Kombination mit Scrying-Magie.","price5e":4000,"pricingRationale":"Permanent tongues (3rd level). Standard-Preis für permanenten 3rd-level-Effekt.","gamePhase":"early","isOp":false,"opNote":"","tags":["utility","communication","language"],"requiresStaff":null,"spellEquivalent5e":"tongues","removable":false},{"name":"Everful Basin","originalPrice3e":4500,"category":"economic","description":"Ein Becken, das nie leer wird.","flavorText":"Das Becken ist immer voll – aber wenn man es vollständig ausleert, ist die Magie unwiederbringlich verloren. Niemals kippen.","mechanicalEffect5e":"Ein Becken, das immer 25 Liter (6 gallons) Wasser enthält. Wenn vollständig geleert (umkippen), verliert es permanent seine Magie.","price5e":4500,"pricingRationale":"Permanent create water (1st level) mit Bodeneffekt. Decanter of Endless Water kostet 9.000 GP in 5e.","gamePhase":"early","isOp":false,"opNote":"","tags":["economic","water","resource"],"requiresStaff":null,"spellEquivalent5e":"create water","removable":true},{"name":"Summoning Stone (III)","originalPrice3e":4500,"category":"security","description":"Ein Stein, der kleine Elementare beschwört.","flavorText":"Die Beschwörung ist nun mächtig genug, um kleine Elementare herbeizurufen. Ein verlässlicher Wächter für wenige Gold.","mechanicalEffect5e":"Beschwört einen Small Elemental oder Fiendish Dire Bat oder 1d3 Fiendish Hyenas (CR 1-2). Greift Eindringlinge an. 3x täglich.","price5e":4500,"pricingRationale":"Entspricht conjure minor elementals (2nd level) oder summon beast III.","gamePhase":"early","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"conjure minor elementals","removable":false},{"name":"Touchstone of Safety (II)","originalPrice3e":5000,"category":"combat","description":"Verbesserter Stein mit stärkerer DR gegen Fernkampfangriffe.","flavorText":"Verbesserter Schutz gegen Fernkampf. Der Bogenschütze, der hier steht, spottet über gegnerische Pfeile.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält Resistenz (halber Schaden) mit +5 auf den Rettungswurf gegen ranged weapon damage. Bei mehreren Kreaturen entfällt der Bonus.","price5e":5000,"pricingRationale":"Verbesserte Version von Typ I. Besserer Schutz für mid-game.","gamePhase":"early","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (enhanced)","removable":true},{"name":"Bed of Restoration, Lesser","originalPrice3e":6000,"category":"residential","description":"Ein Bett, das lesser restoration wirkt.","flavorText":"Drei Runden Ruhe auf diesem Bett, und leichte Schwächungen lösen sich auf. Kein Abenteurer verlässt die Festung ohne diesen Raum aufgesucht zu haben.","mechanicalEffect5e":"Wer 3 Runden lang im Bett liegt, erhält lesser restoration (siehe PHB). Ein Willenssave (DC 13) verhindert den Effekt bei unwilligen Zielen. Nur ein Ziel gleichzeitig.","price5e":6000,"pricingRationale":"Permanent lesser restoration (2nd level). Nützlich, aber nicht übermächtig.","gamePhase":"mid","isOp":false,"opNote":"","tags":["residential","healing","restoration"],"requiresStaff":null,"spellEquivalent5e":"lesser restoration","removable":true},{"name":"Black Luminary","originalPrice3e":6000,"category":"utility","description":"Ein großer Stahlhalbkreis, der Dunkelheit erzeugt.","flavorText":"Ein stiller schwarzer Schein – magische Dunkelheit auf Befehl. Mit dem optionalen Shutter lässt sich das Licht vollständig blockieren.","mechanicalEffect5e":"Erzeugt magical darkness in einem 6m Radius (20 ft). Normales Licht und darkvision funktionieren nicht. Magisches Licht der gleichen oder höheren Stufe kann die Dunkelheit aufheben. Mit verschließbarem Deckel erhältlich.","price5e":6000,"pricingRationale":"Permanent darkness (2nd level). Gegenstück zum daylight-Effekt.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","darkness","environment"],"requiresStaff":null,"spellEquivalent5e":"darkness","removable":true},{"name":"Brazier of Bright Bursts","originalPrice3e":6000,"category":"security","description":"Ein Becken, das Feuerwerke erzeugt und blendet.","flavorText":"Bei Aktivierung explodiert ein prächtiges Feuerwerk das alle Blicke in der Umgebung blendet. Das Feuer erlischt danach, muss aber für die nächste Nutzung neu entzündet werden.","mechanicalEffect5e":"Bei Aktivierung (Bonusaktion, Kommandowort): Alle innerhalb 36m (120 ft), die das Becken sehen können, müssen einen Wisdom save (DC 13) machen. Bei Misserfolg: Blinded für 1d4+1 Runden. Wer weiß, dass es kommt, hat +10 zum Save. Das Feuer erlischt nach der Aktivierung.","price5e":6000,"pricingRationale":"Permanent pyrotechnics (2nd level, fireworks). Gute defensive Option.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","blindness"],"requiresStaff":null,"spellEquivalent5e":"pyrotechnics / Faerie Fire variant","removable":true},{"name":"Bright Luminary","originalPrice3e":6000,"category":"utility","description":"Ein großer Stahlhalbkreis, der Tageslicht erzeugt.","flavorText":"Tageslicht im tiefsten Keller. Mit dem optionalen Shutter lässt sich das Licht nach Bedarf absperren.","mechanicalEffect5e":"Erzeugt bright light in einem 18m Radius (60 ft) und dim light für weitere 18m. Das Licht entspricht Tageslicht. Mit verschließbarem Deckel erhältlich.","price5e":6000,"pricingRationale":"Permanent daylight (3rd level). Sehr nützlich für Untergrundburgen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","light","environment"],"requiresStaff":null,"spellEquivalent5e":"daylight","removable":true},{"name":"Platform of Levitation (Lesser)","originalPrice3e":6000,"category":"utility","description":"Eine Plattform, die sich auf- und abbewegt.","flavorText":"Ein magischer Aufzug für eine Person oder leichte Lasten. Wenn die Plattform in Position ist, versiegelt sie Decke und Boden – kein unerwünschter Besucher kommt so leicht durch.","mechanicalEffect5e":"Eine 1,5m (5 ft) große Plattform, die sich mit 6m (20 ft) pro Runde auf- oder abbewegen kann. Trägt bis zu 115 kg (250 lbs) plus Plattform. Bei Konflikten: Wisdom-Contest. Bleibt in Position, wenn nicht benutzt.","price5e":6000,"pricingRationale":"Permanent levitate (2nd level). Idealer magischer Aufzug.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","movement","transport"],"requiresStaff":null,"spellEquivalent5e":"levitate","removable":false},{"name":"Touchstone of Faith (III)","originalPrice3e":6000,"category":"combat","description":"Ein Stein, der +4 AC-Bonus gewährt.","flavorText":"+4 auf die Rüstungsklasse. Die Runen leuchten in warmem Goldlicht.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält +4 magischer Bonus auf die Rüstungsklasse (stapelt nicht mit anderen magischen AC-Boni). Bei mehreren Kreaturen entfällt der Bonus.","price5e":6000,"pricingRationale":"Stärkere Version. +4 AC ist ein bedeutsamer Bonus.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","buff","defensive"],"requiresStaff":null,"spellEquivalent5e":"shield of faith (enhanced)","removable":true},{"name":"Warding Bell","originalPrice3e":7200,"category":"security","description":"Eine Glocke, die bei Betätigung umfassende Schutzzauber aktiviert.","flavorText":"Beim Läuten der Glocke verriegeln sich Türen, Nebel steigt in Korridoren auf, und Eindringlinge geraten in Verwirrung. Der Burgherr kann alle Effekte jederzeit aufheben.","mechanicalEffect5e":"Bei Läuten (Aktion) aktiviert: guards and wards Effekt auf bis zu 6 angrenzende Räume für 24 Stunden. Einschließlich: arcane lock auf Türen, fog cloud in Korridoren, webs in Ecken, und confusion auf Eindringlinge (DC 15). 1x täglich. Besitzer kann es jederzeit beenden.","price5e":7200,"pricingRationale":"Permanent guards and wards (6th level) mit Einschränkungen. Der Zauber ist sehr mächtig, daher reduzierter Preis durch 1x/Tag Limit.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","protection","alarm"],"requiresStaff":null,"spellEquivalent5e":"guards and wards","removable":true},{"name":"Bier of Inquisition","originalPrice3e":7500,"category":"magic","description":"Eine Steinplatte, die es erlaubt, mit Toten zu sprechen.","flavorText":"Die Lippen des Verstorbenen bewegen sich – er hat noch Dinge zu sagen. Aber dieselbe Leiche wird dieselbe Plattform eine Woche lang nicht mehr nutzen können.","mechanicalEffect5e":"Ein auf die Platte gelegter Leichnam kann für 5 Minuten befragt werden. Bis zu 2 Fragen, so gut wie der Tote kann antworten. Bei Gesinnungsunterschied: Wisdom save (DC 14). Nicht auf Untote anwendbar. 1 Woche Cooldown pro Leichnam.","price5e":7500,"pricingRationale":"Permanent speak with dead (3rd level). Sehr nützlich für Ermittlungen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["magic","divination","interrogation"],"requiresStaff":null,"spellEquivalent5e":"speak with dead","removable":true},{"name":"Chamber of Comfort","originalPrice3e":7500,"category":"residential","description":"Ein Raum mit perfektem Klima und Belüftung.","flavorText":"Immer 21°C, immer frische Luft, niemals stickig – selbst in einem luftdichten Raum weht eine sanfte Brise.","mechanicalEffect5e":"Der Raum hat immer eine Temperatur von ca. 21°C (70°F). Frische Luft wird magisch zirkuliert. Rauch wird direkt abgezogen. Funktioniert selbst in luftdichten Räumen.","price5e":7500,"pricingRationale":"Permanent Leomund's tiny hut (3rd level) Effekte. Praktisch für jede Wohnstätte.","gamePhase":"mid","isOp":false,"opNote":"","tags":["residential","comfort","climate"],"requiresStaff":null,"spellEquivalent5e":"Leomund's tiny hut","removable":false},{"name":"Chamber of Seeing","originalPrice3e":7500,"category":"security","description":"Ein Raum, der alle unsichtbaren Kreaturen sichtbar macht.","flavorText":"Jede unsichtbare Kreatur, die diesen Raum betritt, wird sofort sichtbar. Nur Wesen ohne sichtbare Form – wie Invisible Stalkers – bleiben verborgen.","mechanicalEffect5e":"Jede unsichtbare Kreatur, die den Raum betritt, wird sofort sichtbar (invisibility purge). Nur Kreaturen ohne sichtbare Form (z.B. invisible stalkers) bleiben unsichtbar.","price5e":7500,"pricingRationale":"Permanent see invisibility/globe of invulnerability-Effekt. In 5e: see invisibility ist 2nd level.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","detection","invisibility"],"requiresStaff":null,"spellEquivalent5e":"see invisibility (area)","removable":false},{"name":"Chamber of Sloth","originalPrice3e":7500,"category":"security","description":"Ein Raum, der alle verlangsamt.","flavorText":"Ein gefährlicher Raum: Er verlangsamt alle Kreaturen, also auch Verteidiger. Klug eingesetzt mit Bogenschützen die von außen schießen.","mechanicalEffect5e":"Kreaturen im Raum sind unter slow-Effekt (siehe PHB). Wisdom saving throw (DC 14) negiert. Verteidiger sollten Fernkampfwaffen von außerhalb verwenden.","price5e":7500,"pricingRationale":"Permanent slow (3rd level). Klassische defensive Falle.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","debuff"],"requiresStaff":null,"spellEquivalent5e":"slow","removable":false},{"name":"Engraved Circle of Protection (Any)","originalPrice3e":7500,"category":"security","description":"Ein magischer Kreis, der vor bestimmter Gesinnung schützt.","flavorText":"In den Boden eingravierte Runen bilden einen permanenten Schutzkreis. Kann auch als Gefängnis für beschworene Wesen dienen.","mechanicalEffect5e":"Ein 6m (20 ft) Durchmesser magischer Kreis (magic circle gegen Evil/Good/Chaos/Law). Alternativ: Kann als magisches Gefängnis für eine beschworene Kreatur dienen. Permanent.","price5e":7500,"pricingRationale":"Permanent magic circle (3rd level). Standard-Preis für permanenten 3rd-level-Effekt.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","protection","summoning"],"requiresStaff":null,"spellEquivalent5e":"magic circle","removable":false},{"name":"Garden of Understanding","originalPrice3e":7500,"category":"utility","description":"Ein Garten, in dem man mit Pflanzen sprechen kann.","flavorText":"Einige Burgherren stellen Topfpflanzen im ganzen Raum auf – später können sie die Pflanzen befragen, ob sie etwas mitgehört haben.","mechanicalEffect5e":"Kreaturen im Raum können mit allen Pflanzen (einschließlich Pflanzenkreaturen) kommunizieren (speak with plants). Effekt endet beim Verlassen. Kann für Spionage genutzt werden (Befragung von Topfpflanzen).","price5e":7500,"pricingRationale":"Permanent speak with plants (3rd level). Interessant für Druiden und spionagische Zwecke.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","communication","nature"],"requiresStaff":null,"spellEquivalent5e":"speak with plants","removable":false},{"name":"Hall of Babble","originalPrice3e":7500,"category":"security","description":"Ein Raum, der Sprache unverständlich macht.","flavorText":"Wer ohne Save eintritt, kann sich nicht mehr verständlich machen – und kann keine Zauber mit verbaler Komponente wirken. Besonders effektiv gegen feindliche Magier.","mechanicalEffect5e":"Kreaturen im Raum können nicht verständlich sprechen (Wisdom save DC 14 negiert). Zauber mit verbalen Komponenten können nicht gewirkt werden. Der Effekt endet beim Verlassen.","price5e":7500,"pricingRationale":"Basis-Effekt ähnelt silence, aber spezifisch für Sprache. Entspricht etwa 3rd level.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","magic"],"requiresStaff":null,"spellEquivalent5e":"silence variant","removable":false},{"name":"Leomund's Temperate Hut","originalPrice3e":7500,"category":"residential","description":"Eine permanente magische Hütte mit Schutz.","flavorText":"Billiger als ein echtes Gebäude ist es nicht – aber wo Material und Arbeiter schwer zu bekommen sind, ist es unersetzlich. Von außen undurchsichtig, von innen klar.","mechanicalEffect5e":"Eine 6m Radius Halbkugel (Leomund's tiny hut permanent). Schützt vor Witterung, hält bis zu Orkan-Stürmen stand. Von außen undurchsichtig, von innen durchsichtig. Kreaturen können durchgehen. Kann beleuchtet/verdunkelt werden auf Kommando.","price5e":7500,"pricingRationale":"Permanent Leomund's tiny hut (3rd level ritual). Standard-Preis.","gamePhase":"mid","isOp":false,"opNote":"","tags":["residential","protection","shelter"],"requiresStaff":null,"spellEquivalent5e":"Leomund's tiny hut (ritual)","removable":false},{"name":"Missing Chamber","originalPrice3e":7500,"category":"security","description":"Ein Raum, der schwer durch Divination zu erkennen ist.","flavorText":"Dieser Raum ist für Divinationsmagie schwer zu finden. Ideal für Geheimarchive und verborgene Schatzkammern.","mechanicalEffect5e":"Der Raum und alle darin sind durch nondetection geschützt. Divinations-Zauber erfordern eine Intelligenz (Arkane Zauberkunde) Probe (DC 16), um zu funktionieren.","price5e":7500,"pricingRationale":"Permanent nondetection (3rd level). Wichtig für Geheimräume.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","stealth","divination"],"requiresStaff":null,"spellEquivalent5e":"nondetection","removable":false},{"name":"Path of Watery Solidity","originalPrice3e":7500,"category":"utility","description":"Ein Weg über Wasser.","flavorText":"Bis zu acht angrenzende Felder auf einer Flüssigkeitsoberfläche werden begehbar. Wer den Effekt nicht will, kann ihn mit einem Rettungswurf ablehnen.","mechanicalEffect5e":"Bis zu 8 zusammenhängende 1,5m-Felder auf Wasseroberfläche werden begehbar (water walk). Kreaturen können sich weigern (Wisdom save DC 14).","price5e":7500,"pricingRationale":"Permanent water walk (3rd level ritual). Praktisch für Wasserburgen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","movement","water"],"requiresStaff":null,"spellEquivalent5e":"water walk (ritual)","removable":false},{"name":"Well of Flying","originalPrice3e":7500,"category":"utility","description":"Ein Schacht, der Fliegen ermöglicht.","flavorText":"Wer den Schacht betritt, kann darin fliegen. Mehrere verbundene Brunnen bilden ein mehrstöckiges Flugverbindungsnetz in der Festung.","mechanicalEffect5e":"Kreaturen im Schacht erhalten eine Fluggeschwindigkeit von 27m (90 ft) oder 18m (60 ft) in mittlerer/schwerer Rüstung. Schacht kann bis zu 30m (5ft breit) oder 15m (3m breit) tief sein. Mehrere Brunnen können verbunden werden.","price5e":7500,"pricingRationale":"Permanent fly (3rd level) in einem begrenzten Bereich. Sehr nützlich für mehrstöckige Burgen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","movement","transport"],"requiresStaff":null,"spellEquivalent5e":"fly (limited)","removable":false},{"name":"Summoning Stone (IV)","originalPrice3e":8400,"category":"security","description":"Ein Stein, der Lantern Archons oder Hell Hounds beschwört.","flavorText":"Celestiale oder höllische Wesen von CR 2-3 erscheinen auf Befehl. Die Beschwörung ist nun für ernsthafte Eindringlinge gefährlich.","mechanicalEffect5e":"Beschwört 1 Lantern Archon, 1 Hell Hound, oder 1d3 Juvenile Salamanders (CR 2-3). 3x täglich.","price5e":8400,"pricingRationale":"Conjure celestial/fiends (4th level equivalent).","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"conjure celestial (minor)","removable":false},{"name":"Chamber of Airy Water","originalPrice3e":8500,"category":"utility","description":"Ein Raum, in dem man unter Wasser atmen kann.","flavorText":"In Unterwasserfestungen unverzichtbar – jeder Besucher vom Festland atmet hier wie an der frischen Luft. Wer es nicht möchte kann es ablehnen.","mechanicalEffect5e":"Kreaturen im Raum können unter Wasser atmen (water breathing). Wasseratmer sind nicht betroffen. Ein Weisheits-Rettungswurf (DC 14) verweigert den Effekt.","price5e":8500,"pricingRationale":"Permanent water breathing (3rd level ritual). Essential für Wasserburgen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","water","breathing"],"requiresStaff":null,"spellEquivalent5e":"water breathing (ritual)","removable":false},{"name":"Chamber of Safety","originalPrice3e":9000,"category":"combat","description":"Ein Raum mit DR gegen Fernkampfangriffe.","flavorText":"Alles im Raum erhält Resistenz gegen Fernkampfwaffen. Verteidiger hinter dieser Kammer lachen über feindliche Bogenschützen.","mechanicalEffect5e":"Alle Kreaturen und Objekte im Raum haben Resistenz (halber Schaden) gegen ranged weapon damage. Der Raum selbst ist ebenfalls geschützt.","price5e":9000,"pricingRationale":"Permanent protection from energy (3rd level) für den ganzen Raum.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy","removable":false},{"name":"Touchstone of Faith (IV)","originalPrice3e":9000,"category":"combat","description":"Ein Stein, der +5 AC-Bonus gewährt.","flavorText":"+5 magischer Bonus auf die Rüstungsklasse. Der stärkste Schutzstein der Reihe.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält +5 magischer Bonus auf die Rüstungsklasse (stapelt nicht mit anderen magischen AC-Boni). Bei mehreren Kreaturen entfällt der Bonus.","price5e":9000,"pricingRationale":"Maximale Version. +5 AC ist sehr stark.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","buff","defensive"],"requiresStaff":null,"spellEquivalent5e":"shield of faith (max)","removable":true},{"name":"Frightful Tapestry","originalPrice3e":10000,"category":"security","description":"Ein Wandteppich, der Furcht auslöst.","flavorText":"Ein riesiger Wandteppich nimmt eine ganze Wand ein. Schwächere Kreaturen fliehen – stärkere werden zumindest irritiert.","mechanicalEffect5e":"Kreaturen mit weniger als CR 6, die den Raum betreten, werden Frightened für 5 Runden (Wisdom save DC 13 negiert). Eine frightened Kreatur flieht auf dem kürzesten Weg. Wenn Flucht unmöglich: -2 auf Angriffe, Schaden und Saves.","price5e":10000,"pricingRationale":"Permanent fear-Effekt (3rd level equivalent). Gut für Eingangsbereiche.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","fear"],"requiresStaff":null,"spellEquivalent5e":"fear (reduced)","removable":true},{"name":"Touchstone of Safety (III)","originalPrice3e":10000,"category":"combat","description":"Stein mit DR 15 gegen Fernkampfangriffe.","flavorText":"Starker Schutz gegen Fernkampf für denjenigen der auf dem Stein steht.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält Resistenz (halber Schaden) mit +5 auf den Rettungswurf gegen ranged weapon damage.","price5e":10000,"pricingRationale":"Mittelstarke Version des Touchstone.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (enhanced)","removable":true},{"name":"Zone of Elemental Immunity","originalPrice3e":10000,"category":"security","description":"Ein Raum, der gegen einen Schadenstyp immun ist.","flavorText":"Der Raum und alle darin teilen sich Immunität gegen einen Schadenstyp der von außen einwirkt. Quellen aus dem Inneren wirken normal.","mechanicalEffect5e":"Der Raum ist immun gegen Schaden eines spezifischen Typs (acid, cold, fire, lightning, thunder). Kreaturen im Raum teilen diese Immunität für Schaden von außen. Schaden von innen (z.B. fireball im Raum) wirkt normal.","price5e":10000,"pricingRationale":"Permanent protection from energy (3rd level) als Immunity. Stark, aber ein Element.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","protection","elemental"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (enhanced)","removable":false},{"name":"Ambassador's Chamber","originalPrice3e":10500,"category":"social","description":"Ein Raum, der die Haltung von Besuchern verbessert.","flavorText":"Die Haltung jedes Besuchers verbessert sich um eine Stufe in Richtung freundlich. Kämpfende Kreaturen bleiben unberührt. Viele Throne rooms nutzen dies.","mechanicalEffect5e":"Kreaturen, die den Raum betreten, werden gegenüber dem Burgherrn und seinen Verbündeten für 1 Stunde als freundlich gesinnt (charmed) behandelt (Wisdom save DC 14 negiert). Kämpfende Kreaturen sind nicht betroffen.","price5e":10500,"pricingRationale":"Permanent charm person/Effekt. Entspricht emotion/friendship (3rd level in 3.5, adaptiert für 5e).","gamePhase":"mid","isOp":false,"opNote":"","tags":["social","diplomacy","enchantment"],"requiresStaff":null,"spellEquivalent5e":"charm person (area)","removable":false},{"name":"Hall of Despair","originalPrice3e":10500,"category":"security","description":"Ein Raum, der Mut und Hoffnung zersetzt.","flavorText":"Eine beklemmende Schwere – alle Proben leiden darunter. Am wirkungsvollsten in Kombination mit Inscriptions of Urgency.","mechanicalEffect5e":"Kreaturen im Raum haben -2 auf alle Angriffe, Schadenswürfe, Fähigkeitswürfe, Saves und Skill Checks (Wisdom save DC 14 negiert). Effekt hält während des Aufenthalts an.","price5e":10500,"pricingRationale":"Permanent bane/debuff-Effekt (3rd level equivalent).","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","debuff"],"requiresStaff":null,"spellEquivalent5e":"bane (enhanced)","removable":false},{"name":"Hall of Fear","originalPrice3e":10500,"category":"security","description":"Ein Raum, der Kreaturen zur Flucht zwingt.","flavorText":"Alle müssen fliehen – es sei denn, sie bestehen den Weisheits-Rettungswurf. Die engsten Korridore der Festung eignen sich besonders gut.","mechanicalEffect5e":"Kreaturen, die den Raum betreten, werden Frightened und müssen auf dem kürzesten Weg fliehen (Wisdom save DC 14 negiert). Die Furcht hält, solange sie im Raum sind.","price5e":10500,"pricingRationale":"Permanent fear (3rd level). Stärker als das Tapestry.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","fear"],"requiresStaff":null,"spellEquivalent5e":"fear","removable":false},{"name":"Hall of Hope","originalPrice3e":10500,"category":"combat","description":"Ein Raum, der Mut und Zuversicht stärkt.","flavorText":"Ein Gefühl der Stärke – die meisten Kreaturen die den Effekt kennen, lehnen den Rettungswurf freiwillig ab.","mechanicalEffect5e":"Kreaturen im Raum erhalten +2 auf alle Angriffe, Schadenswürfe, Fähigkeitswürfe, Saves und Skill Checks. Der Effekt endet beim Verlassen (meistens nehmen Kreaturen den Save nicht).","price5e":10500,"pricingRationale":"Permanent bless/enhance ability (3rd level equivalent). Gegenstück zum Hall of Despair.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","buff","morale"],"requiresStaff":null,"spellEquivalent5e":"bless + enhance ability","removable":false},{"name":"Hall of Strife","originalPrice3e":10500,"category":"combat","description":"Ein Raum, der Kampfeslust erzeugt.","flavorText":"Kampflust pur – die meisten Krieger die den Effekt kennen, lehnen den Rettungswurf freiwillig ab. Barbaren können ihren Wutanfall damit nicht stapeln.","mechanicalEffect5e":"Kreaturen im Raum erhalten +2 auf Stärke- und Konstitutionswürfe, +1 auf Weisheits-Rettungswürfe, −1 Rüstungsklasse. Sie müssen kämpfen, wenn Gefahr besteht (kein Rückzug). Stapelt nicht mit Barbar Rage. Wisdom save DC 14 negiert.","price5e":10500,"pricingRationale":"Permanent rage-Effekt (3rd level equivalent). Wie berserk.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","buff","rage"],"requiresStaff":null,"spellEquivalent5e":"berserk / rage","removable":false},{"name":"Pool of Scrying","originalPrice3e":12000,"category":"magic","description":"Ein Becken, das Scrying ermöglicht.","flavorText":"Die Wasseroberfläche spiegelt nicht den Raum, sondern ferne Orte. Wenn das Becken jemals vollständig entleert wird, verliert es seine Magie dauerhaft.","mechanicalEffect5e":"Ein flaches Becken (mindestens 0,6m × 1,2m), das als scrying-Fokus dient. Der Benutzer kann wie mit dem scrying-Zauber (5th level) spionieren. Zauber können durch das Becken auf das Ziel gewirkt werden. Wenn leer: Magie erlischt permanent.","price5e":12000,"pricingRationale":"Permanent scrying (5th level). Standard-Preis für permanenten 5th-level-Effekt.","gamePhase":"mid","isOp":false,"opNote":"","tags":["magic","divination","scrying"],"requiresStaff":null,"spellEquivalent5e":"scrying","removable":true},{"name":"Summoning Stone (V)","originalPrice3e":13500,"category":"security","description":"Ein Stein, der Formian Warriors oder Salamanders beschwört.","flavorText":"Planare Wesen von Bedeutung erscheinen. Wer diese Steine aufstellt, weiß was er tut – und was er riskiert.","mechanicalEffect5e":"Beschwört 1 Formian Warrior, 1 Adult Salamander, oder 1d3 Vargouilles (CR 3-4). 3x täglich.","price5e":13500,"pricingRationale":"Conjure elemental/celestial/fiend (5th level equivalent).","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"conjure elemental","removable":false},{"name":"Cacophonous Chamber","originalPrice3e":14000,"category":"security","description":"Ein Raum, der ohrenbetäubenden Lärm erzeugt.","flavorText":"Die Wände selbst scheinen zu schreien. Magische Stille (silence) blockiert diesen Effekt vollständig.","mechanicalEffect5e":"Beim Betreten: Constitution saving throw (DC 16). Bei Misserfolg: Deafened für 2d6 Runden und 2d6 Thunder damage. Erfolg: Halber Schaden, nicht taub. Kristalline Kreaturen/Objekte nehmen 7d6 Schaden. Funktioniert nicht in magical silence.","price5e":14000,"pricingRationale":"Permanent shout (4th level). Stärkere Falle.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","sonic"],"requiresStaff":null,"spellEquivalent5e":"shout","removable":false},{"name":"Chamber of the Earthbound","originalPrice3e":14000,"category":"security","description":"Ein Raum, der Fliegende zu Boden zwingt.","flavorText":"Innerhalb dieser Kammer kann niemand fliegen. Wer beim Betreten fliegt, gleitet sanft zu Boden – beim Verlassen setzt der Effekt sofort wieder ein.","mechanicalEffect5e":"Der fly-Zauber und ähnliche Flugeffekte funktionieren im Raum nicht. Fliegende Kreaturen sinken sanft zu Boden. Beim Verlassen kehren Effekte zurück, falls noch aktiv.","price5e":14000,"pricingRationale":"Permanent earthbind/dispel magic-Kombination (4th level equivalent).","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","movement"],"requiresStaff":null,"spellEquivalent5e":"earthbind","removable":false},{"name":"Illusory Landscape","originalPrice3e":14000,"category":"security","description":"Verändert das Aussehen der Umgebung der Burg.","flavorText":"Einige Erbauer verzaubern das Terrain noch bevor sie zu bauen beginnen – so weiß niemand wo die Festung wirklich steht.","mechanicalEffect5e":"Bis zu 47 angrenzende Räume können mit einer illusionären Landschaft überzogen werden (hallucinatory terrain). Natürliches Terrain kann verborgen oder verändert werden. Strukturen und Kreaturen sind nicht betroffen. Mehrere Effekte können überlappen.","price5e":14000,"pricingRationale":"Permanent hallucinatory terrain (4th level). Gut für Tarnung.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","illusion","stealth"],"requiresStaff":null,"spellEquivalent5e":"hallucinatory terrain","removable":false},{"name":"Inscriptions of Privacy","originalPrice3e":14000,"category":"security","description":"Warnt vor Scrying-Versuchen.","flavorText":"Die Wände leuchten kurz auf wenn jemand spioniert. Der Beobachtete kann versuchen ein Bild des Spähers zu erhalten.","mechanicalEffect5e":"Wenn jemand versucht, durch scrying, clairvoyance, oder ähnliche Mittel in den Raum zu spionieren, leuchten die Inschriften. Das Ziel kann einen contested check (Investigation vs. Ziel's Spell save DC) machen, um ein mentales Bild des Spähers und dessen Richtung/Entfernung zu erhalten.","price5e":14000,"pricingRationale":"Permanent detect scrying (4th level). Wichtig für sichere Bereiche.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","detection","scrying"],"requiresStaff":null,"spellEquivalent5e":"detect scrying","removable":false},{"name":"Leomund's Lasting Shelter","originalPrice3e":14000,"category":"residential","description":"Eine permanente magische Unterkunft.","flavorText":"Billiger zu bauen als ein echtes Gebäude ist es nicht – aber in Gegenden wo Material und Arbeiter schwer zu beschaffen sind, ist es unersetzlich.","mechanicalEffect5e":"Ein permanentes Leomund's secure shelter. Ein kleines Haus (ca. 4 Räume) mit fensterlosen Wänden, starker Tür mit arcane lock, Kamin mit Eisengitter, und einem unseen servant. Kann als Basis für eine kleine Burg dienen.","price5e":14000,"pricingRationale":"Permanent Leomund's secure shelter (4th level). Beinhaltet mehrere Effekte.","gamePhase":"mid","isOp":false,"opNote":"","tags":["residential","shelter","protection"],"requiresStaff":null,"spellEquivalent5e":"Leomund's secure shelter","removable":false},{"name":"Platform of Jaunting","originalPrice3e":14000,"category":"utility","description":"Eine Plattform, die dimension door wirkt.","flavorText":"Wer auf die Plattform tritt, landet bis zu 200 Meter entfernt – sofort. Wer falsche Koordinaten nennt, riskiert im Astralen Meer gefangen zu bleiben.","mechanicalEffect5e":"Wer auf der 3m-Plattform steht, kann sich bis zu 200m (680 ft) teleportieren (dimension door). Kann bis zu 160 kg tragen. Bei Teleport in festes Objekt: Auf dem Astralplan gefangen bis Willenssave DC 25 (jede Runde).","price5e":14000,"pricingRationale":"Permanent dimension door (4th level). Sehr nützlich für schnelle Fortbewegung.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","teleport","transport"],"requiresStaff":null,"spellEquivalent5e":"dimension door","removable":false},{"name":"Prison of Fire","originalPrice3e":14000,"category":"security","description":"Ein Raum, der von Feuerwänden umgeben ist.","flavorText":"Die Flammen erlöschen bei starkem Kälteschaden kurz – aber nach 1d4 Minuten lodern sie erneut.","mechanicalEffect5e":"Der Raum ist von einer permanenten wall of fire umgeben. Kreaturen, die die Wand durchqueren, nehmen Schaden wie vom Zauber (4d6 Fire damage). Kälteschaden (20+ in einer Runde) löscht 1d4 Minuten lang einen 1,5m-Abschnitt.","price5e":14000,"pricingRationale":"Permanent wall of fire (4th level). Klassisches magisches Gefängnis.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","fire"],"requiresStaff":null,"spellEquivalent5e":"wall of fire","removable":false},{"name":"Prison of Ice","originalPrice3e":14000,"category":"security","description":"Ein Raum, der von Eiswänden umgeben ist.","flavorText":"Das Eis regeneriert sich in Minuten. Feuer macht vollen Schaden – ein kluger Angreifer kommt mit Fackeln.","mechanicalEffect5e":"Der Raum ist von 18cm dicken Eiswänden umgeben (AC 12, 30 HP pro 3m-Abschnitt). Bei Bruch: 1d4 Minuten bis zur Selbstreparatur. Feuer macht vollen Schaden. Plötzliches Schmelzen erzeugt 10 Minuten Nebel.","price5e":14000,"pricingRationale":"Permanent wall of ice (4th level). Feueranfällig.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","trap","cold"],"requiresStaff":null,"spellEquivalent5e":"wall of ice","removable":false},{"name":"Proof against Vermin","originalPrice3e":14000,"category":"utility","description":"Hält Ungeziefer fern.","flavorText":"Viele Burgherren installieren dies in Vorratskammern und Küchen. Auch Schlafgemächer profitieren davon.","mechanicalEffect5e":"Vermin (siehe Monster Manual) mit 2 oder weniger Hit Dice (CR) können den Raum nicht betreten. Solche mit 3+ Hit Dice (CR) müssen einen Wisdom save (DC 16) bestehen und nehmen 2d6 Schaden bei Kontakt mit der Barriere.","price5e":14000,"pricingRationale":"Permanent repel vermin (4th level in 3.5, adaptiert). Praktisch für Keller und Vorratsräume.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","protection","vermin"],"requiresStaff":null,"spellEquivalent5e":"repel vermin (adapted)","removable":false},{"name":"Sigils of Suppression, Lesser","originalPrice3e":14000,"category":"security","description":"Blockiert Zauber bis zum 3. Grad.","flavorText":"Zauber bis Grad 3 funktionieren hier einfach nicht. Dispel magic kann den Effekt nur vorübergehend unterdrücken.","mechanicalEffect5e":"Zauber des 3. Grades oder niedriger können im Raum nicht gewirkt werden noch ihre Effekte in den Raum hineinreichen. dispel magic kann den Effekt temporär unterdrücken.","price5e":14000,"pricingRationale":"Permanent globe of invulnerability (4th level). Sehr stark für magische Sicherheit.","gamePhase":"mid","isOp":false,"opNote":"","tags":["security","magic","suppression"],"requiresStaff":null,"spellEquivalent5e":"globe of invulnerability","removable":false},{"name":"Bed of Wellness (Any)","originalPrice3e":15000,"category":"residential","description":"Ein Bett, das spezifische Übel heilt.","flavorText":"Eine Nacht hier, und Blindheit, Flüche oder Krankheiten verschwinden. Unverzichtbar für Abenteurer die regelmäßig solchen Effekten ausgesetzt sind.","mechanicalEffect5e":"Wer 3 Runden im Bett liegt, erhält einen der folgenden Effekte: lesser restoration, remove blindness/deafness, remove curse, oder remove disease (bei Erstellung wählen). Constitution save (DC 14) verweigert unwilligen Zielen den Effekt.","price5e":15000,"pricingRationale":"Permanent 3rd level healing-Zauber. Sehr nützlich für private Heilräume.","gamePhase":"mid","isOp":false,"opNote":"","tags":["residential","healing","restoration"],"requiresStaff":null,"spellEquivalent5e":"remove curse/disease/blindness","removable":true},{"name":"Black Luminary, Pitch","originalPrice3e":15000,"category":"utility","description":"Erzeugt tiefe Dunkelheit.","flavorText":"Tiefste Schwärze – selbst Darkvision versagt. Mit Shutter.","mechanicalEffect5e":"Erzeugt magical darkness in 18m Radius (60 ft). Sogar darkvision funktioniert nicht. Truesight kann durchdringen. Magisches Licht der gleichen oder höheren Stufe hebt die Dunkelheit auf. Mit verschließbarem Deckel erhältlich.","price5e":15000,"pricingRationale":"Permanent deeper darkness (3rd level). Gegenstück zu daylight.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","darkness","environment"],"requiresStaff":null,"spellEquivalent5e":"darkness (enhanced)","removable":true},{"name":"Chamber of Speed","originalPrice3e":15000,"category":"utility","description":"Ein Raum, der alle beschleunigt.","flavorText":"Alles geht schneller hier – die meisten Aufgaben lassen sich in etwa der halben Zeit erledigen. Besonders beliebt bei Alchemisten und Kopisten.","mechanicalEffect5e":"Kreaturen im Raum sind unter dem haste-Effekt (siehe PHB). Zusätzliche Aktion, +2 AC, doppelte Geschwindigkeit, Vorteil auf Dexterity saves. Nützlich um Aufgaben schneller zu erledigen.","price5e":15000,"pricingRationale":"Permanent haste (3rd level). Sehr stark für Produktivität.","gamePhase":"mid","isOp":true,"opNote":"Permanent haste ist sehr mächtig. Empfehlung: Effekt hält nur 1 Stunde pro Kreatur pro Tag, oder erfordert Konzentration.","tags":["utility","buff","speed"],"requiresStaff":null,"spellEquivalent5e":"haste","removable":false},{"name":"Everful Larder","originalPrice3e":15000,"category":"utility","description":"Ein Vorratsschrank, der immer Essen produziert.","flavorText":"Bei jedem Öffnen erscheint einfaches, nahrhaftes Essen für fünf Personen. Das Essen verdirbt nach 24 Stunden – außer man reinigt es mit purify food and water.","mechanicalEffect5e":"Bei jedem Öffnen produziert der Schrank einfaches, nahrhaftes Essen für 5 Personen (create food and water). Das Essen wird nach 24 Stunden ungenießbar, wenn nicht purify food and drink gewirkt wird.","price5e":15000,"pricingRationale":"Permanent create food and water (3rd level). Sehr wertvoll für Belagerungen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["economic","food","resource"],"requiresStaff":null,"spellEquivalent5e":"create food and water","removable":false},{"name":"Touchstone of Safety (IV)","originalPrice3e":15000,"category":"combat","description":"Stein mit DR 20 gegen Fernkampfangriffe.","flavorText":"Fast vollkommener Schutz gegen Fernkampfangriffe. Der Stein pulsiert warm.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält Resistenz (halber Schaden) mit Vorteil auf den Rettungswurf gegen ranged weapon damage.","price5e":15000,"pricingRationale":"Starke Version des Touchstone.","gamePhase":"mid","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (enhanced)","removable":true},{"name":"Map of Guidance","originalPrice3e":18000,"category":"utility","description":"Eine magische Karte der Burg.","flavorText":"Diese Karte bildet die gesamte Festung ab – sogar Erweiterungen die nach ihrer Entstehung hinzugefügt wurden. Der Erbauer kann Geheimgänge und Fallen ausblenden.","mechanicalEffect5e":"Mindestens 1,2m × 0,9m große Karte, die in Stein oder Metall eingraviert ist. Zeigt alle Räume der Burg auf demselben Plane. Bei Berührung eines Raumes: Man kennt sofort den kürzesten Weg dorthin. Kann versteckte Bereiche aussparen. Kann Fallen/Passwörter zeigen (bei Erstellung wählen).","price5e":18000,"pricingRationale":"Permanent find the path (6th level) für Navigation. Sehr nützlich für große Burgen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","navigation","map"],"requiresStaff":null,"spellEquivalent5e":"find the path","removable":true},{"name":"Map of Tactics","originalPrice3e":18000,"category":"utility","description":"Eine taktische Karte, die Positionen von Verbündeten zeigt.","flavorText":"Die Karte zeigt nicht nur Positionen sondern auch den Zustand aller verfolgten Personen: unverletzt, verwundet, bewusstlos, tot. Jeder in 1,5 Metern Nähe kann die Symbole intuitiv lesen.","mechanicalEffect5e":"1,5m × 1,5m große taktische Karte der Burg und Umgebung (1 Meile Radius). Bei Berührung erscheint ein leuchtender Punkt an der eigenen Position. Bis zu 3 Ziele können für 9 Stunden verfolgt werden. Der Punkt zeigt auch den Status (verletzt, bewusstlos, tot).","price5e":18000,"pricingRationale":"Permanent status (6th level equivalent). Sehr wertvoll für militärische Operationen.","gamePhase":"mid","isOp":false,"opNote":"","tags":["utility","tracking","tactics"],"requiresStaff":null,"spellEquivalent5e":"status","removable":true},{"name":"Summoning Stone (VI)","originalPrice3e":19800,"category":"security","description":"Ein Stein, der große Elementare beschwört.","flavorText":"Große Elementare erscheinen. Diese Steine setzen voraus, dass der Erbauer weiß was er tut.","mechanicalEffect5e":"Beschwört 1 Large Elemental, 1 Belker, oder 1d3 Hound Archons (CR 5). 3x täglich.","price5e":19800,"pricingRationale":"Conjure elemental (5th level). Jetzt werden die Beschwörungen gefährlich.","gamePhase":"late","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"conjure elemental","removable":false},{"name":"Platform of Telekinesis (Lesser)","originalPrice3e":20000,"category":"utility","description":"Eine Plattform, die sich in jede Richtung bewegt.","flavorText":"Wie die Levitationsplattform – aber in alle Richtungen. Kann auch als mobile Waffenträger-Plattform eingesetzt werden.","mechanicalEffect5e":"Eine Plattform, die sich mit 6m pro Runde in jede Richtung bewegen kann (telekinesis-Effekt). Trägt bis zu 230 kg. Bei Konflikten: Wisdom-Contest. Kann als mobiler Waffenträger oder Transporter dienen.","price5e":20000,"pricingRationale":"Permanent telekinesis (5th level). Vielseitig und mächtig.","gamePhase":"late","isOp":false,"opNote":"","tags":["utility","movement","telekinesis"],"requiresStaff":null,"spellEquivalent5e":"telekinesis","removable":false},{"name":"Touchstone of Safety (V)","originalPrice3e":20000,"category":"combat","description":"Höchste Stufe des Touchstone mit DR 25.","flavorText":"Maximaler Schutz. Der Stein strahlt eine fast greifbare Wärme aus.","mechanicalEffect5e":"Einzelne Kreatur auf dem Stein erhält Immunität gegen gegen ranged weapon damage.","price5e":20000,"pricingRationale":"Maximale Version. Sehr starker Schutz.","gamePhase":"late","isOp":false,"opNote":"","tags":["combat","defensive","ranged"],"requiresStaff":null,"spellEquivalent5e":"protection from energy (max)","removable":true},{"name":"Bier of Life","originalPrice3e":22500,"category":"magic","description":"Eine Steinplatte, die raise dead wirkt.","flavorText":"Ein Diamant über dem Herzen, die Leiche auf der Plattform – und wenn Seele und Schicksal es erlauben, öffnen sich die Augen wieder.","mechanicalEffect5e":"Wirkt raise dead auf jeden Leichnam, der darauf gelegt wird, wenn ein Diamant im Wert von mindestens 500 GP über dem Herzen platziert wird (wird verbraucht). Der Tote muss weniger als 9 Tage tot sein und freiwillig zurückkehren. Kosten: 1 Level oder 1 CON-Point bei Level 1.","price5e":22500,"pricingRationale":"Permanent raise dead (5th level) mit Materialkomponente. Sehr wertvoll für Abenteurergruppen.","gamePhase":"late","isOp":false,"opNote":"","tags":["magic","healing","resurrection"],"requiresStaff":null,"spellEquivalent5e":"raise dead","removable":true},{"name":"Chamber of Weak-Mindedness","originalPrice3e":22500,"category":"security","description":"Ein nebliger Raum, der Willenskraft schwächt.","flavorText":"Am besten zusammen mit anderen Effekten eingesetzt – etwa Inscriptions of Urgency. Ein Enkanter oder Barde schätzt einen solchen Raum besonders.","mechanicalEffect5e":"Beim Betreten: Wisdom save (DC 17). Bei Misserfolg: -10 auf Wisdom checks und Willenswürfe. Effekt hält 2d6 Runden nach dem Verlassen an. Bei erfolgreichem Save: Immun solange im Raum. Verlassen und Wiedereintritt erfordert neuen Save.","price5e":22500,"pricingRationale":"Permanent mind fog (5th level). Tödlich in Kombination mit anderen Effekten.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","trap","debuff"],"requiresStaff":null,"spellEquivalent5e":"mind fog","removable":false},{"name":"Inscriptions of Vacancy","originalPrice3e":22500,"category":"security","description":"Lässt den Raum für Scrying leer erscheinen.","flavorText":"Throne rooms and war councils rely on this. Der Raum sieht für jeden Späher vollkommen leer aus.","mechanicalEffect5e":"Der Raum erscheint bei Scrying-Versuchen vollständig leer und verlassen, egal wie viele Kreaturen sich darin befinden. Nützlich für Thronräume und Kriegsräume.","price5e":22500,"pricingRationale":"Permanent false vision (5th level). Wichtig für politische Sicherheit.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","stealth","scrying"],"requiresStaff":null,"spellEquivalent5e":"false vision","removable":false},{"name":"Prison of the Mind","originalPrice3e":22500,"category":"security","description":"Ein Raum, der feeblemind wirkt.","flavorText":"Die meisten Burgherren halten diesen Raum fest verschlossen – er unterscheidet nicht zwischen Freund und Feind.","mechanicalEffect5e":"Beim Betreten: Wisdom save (DC 17). Bei Misserfolg: feeblemind-Effekt. Arkane Zauberwirker (Magier, Zauberer, Barden) haben Nachteil auf den Rettungswurf. Int und Charisma werden auf 1 reduziert. Nur greater restoration, heal, oder wish können den Effekt aufheben.","price5e":22500,"pricingRationale":"Permanent feeblemind (5th level). Extrem gefährliche Falle.","gamePhase":"late","isOp":true,"opNote":"Feeblemind permanent ist sehr hart. Empfehlung: Effekt hält 24 Stunden oder bis zum Verlassen des Raumes.","tags":["security","trap","curse"],"requiresStaff":null,"spellEquivalent5e":"feeblemind","removable":false},{"name":"Prison of Thorns","originalPrice3e":22500,"category":"security","description":"Ein Raum, der von Dornenwänden umgeben ist.","flavorText":"Selbst wenn man sich durchhackt, wartet dahinter immer noch die normale Burgmauer. Das Dornenwerk regeneriert sich in Stunden.","mechanicalEffect5e":"Der Raum ist von wall of thorns umgeben. Durchqueren kostet 25 - AC Schaden pro Runde (Dexterity und dodge Boni zählen nicht). Mit slashing weapons kann man sich in 10 Minuten 30cm weit schneiden. Magisches Feuer brennt 10 Minuten lang einen Abschnitt. Regeneriert in 1d4 Stunden.","price5e":22500,"pricingRationale":"Permanent wall of thorns (5th level druid). Naturbasierende Falle.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","trap","nature"],"requiresStaff":null,"spellEquivalent5e":"wall of thorns","removable":false},{"name":"Tree of Jaunting","originalPrice3e":22500,"category":"utility","description":"Ein Baum, der Teleportation zwischen Bäumen ermöglicht.","flavorText":"Ein Schritt in den Baum – man taucht aus einem anderen auf. Der Baum muss breiter sein als man selbst.","mechanicalEffect5e":"Wer in diesen Baum eintritt, kann zu einem anderen Baum der gleichen Art teleportieren (ähnlich dem Druiden-Zauber Tree Stride, 5th level). Der Baum muss breiter sein als man selbst. Effektive Reichweite: ca. 4,5 km.","price5e":22500,"pricingRationale":"Permanent tree stride (5th level druid). Sehr nützlich für schnelle Fortbewegung.","gamePhase":"late","isOp":false,"opNote":"","tags":["utility","teleport","nature"],"requiresStaff":null,"spellEquivalent5e":"tree stride","removable":false},{"name":"Veil of Obscurity","originalPrice3e":25000,"category":"security","description":"Verkleidet bis zu 20 Räume.","flavorText":"Einige Erbauer legen diesen Effekt an, bevor sie überhaupt zu bauen beginnen – so weiß niemand welche Burg hinter der Illusion steckt.","mechanicalEffect5e":"Bis zu 20 zusammenhängende Räume können mit mirage arcana verkleidet werden. Beeinhaltet visuelle, akustische, taktile und olfaktorische Elemente. Kann Strukturen nicht verbergen, aber ihr Aussehen komplett ändern.","price5e":25000,"pricingRationale":"Permanent mirage arcana (5th level). Mächtige Tarnung.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","illusion","stealth"],"requiresStaff":null,"spellEquivalent5e":"mirage arcana","removable":false},{"name":"Summoning Stone (VII)","originalPrice3e":27300,"category":"security","description":"Beschwört Invisible Stalkers oder Slaad.","flavorText":"Was dieser Stein herbeiruft ist kein kleines Wesen mehr. Nur erfahrene Magier sollten solche Steine installieren.","mechanicalEffect5e":"Beschwört 1 Invisible Stalker, 1 Blue Slaad, oder 1d3 Barbazus (CR 6). 3x täglich.","price5e":27300,"pricingRationale":"Conjure elemental (6th level equivalent). Jetzt auf hohem Gefährdungsniveau.","gamePhase":"late","isOp":false,"opNote":"","tags":["combat","summon","trap"],"requiresStaff":null,"spellEquivalent5e":"conjure elemental (greater)","removable":false},{"name":"Rainbow Tapestry","originalPrice3e":28000,"category":"security","description":"Ein Wandteppich, der hypnotisiert.","flavorText":"Ein wunderschönes Regenbogenmuster das alle Blicke auf sich zieht – und gebannte Betrachter auf der Stelle festhält.","mechanicalEffect5e":"Kreaturen, die den Teppich sehen, müssen einen Wisdom save (DC 16) machen. Bei Misserfolg: gebannt (charmed): Kreatur steht wie gelähmt und kann sich nicht vom Teppich wegbewegen. Sie kann sich nur verteidigen, nicht aktiv handeln. Angriff befreit. Maximal CR 24 Kreaturen gleichzeitig. Sightless Kreaturen immun.","price5e":28000,"pricingRationale":"Permanent rainbow pattern (4th level). Gute defensive Falle.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","trap","illusion"],"requiresStaff":null,"spellEquivalent5e":"rainbow pattern","removable":true},{"name":"Platform of Healing","originalPrice3e":30000,"category":"residential","description":"Eine Plattform, die heal wirkt.","flavorText":"Ein Schritt auf die Plattform und alle Wunden schließen sich. Untote erleiden das Gegenteil.","mechanicalEffect5e":"Wer auf die 3m-Plattform tritt, erhält heal (siehe PHB): 70 HP Heilung, entfernt blinded, deafened, diseased. Untote erhalten statt dessen harm (Reduce zu 1d4 HP).","price5e":30000,"pricingRationale":"Permanent heal (6th level). Sehr mächtig!","gamePhase":"late","isOp":true,"opNote":"Gratis heal ist in 5e sehr stark. Empfehlung: 1x pro Kreatur pro Woche, oder erfordert 100 GP Diamant pro Nutzung.","tags":["residential","healing","powerful"],"requiresStaff":null,"spellEquivalent5e":"heal","removable":false},{"name":"Chamber of the Unliving","originalPrice3e":33000,"category":"security","description":"Ein Raum, den Lebende nicht betreten können.","flavorText":"Nekromanten lieben diesen Raum – ihre untoten Diener bewegen sich frei hindurch, während Eindringlinge aus Fleisch und Blut nicht eintreten können.","mechanicalEffect5e":"Der Raum ist von antilife shell umgeben. Living creatures können nicht eintreten. Konstrukte, Elementare, Außerebenen-Wesen (Fiends, Celestials, etc.) und Untote sind nicht betroffen. Kein Rettungswurf möglich.","price5e":33000,"pricingRationale":"Permanent antilife shell (5th or 6th level). Ideal für Nekromanten.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","protection","undead"],"requiresStaff":null,"spellEquivalent5e":"antilife shell","removable":false},{"name":"Cloudgathering Orb","originalPrice3e":33000,"category":"utility","description":"Ein Orb, der das Wetter kontrolliert.","flavorText":"Der Orb hält das Wetter rund um die Festung dauerhaft ungemütlich. Wer das Wetter magisch ändern will, muss sich gegen den Orb durchsetzen.","mechanicalEffect5e":"Erzeugt permanent schlechtes Wetter (Gewitter im Frühling, Regen im Sommer, Schneeregen im Herbst, Blizzard im Winter) in 3 km Radius. control weather erfordert einen opposed level check gegen den Orb.","price5e":33000,"pricingRationale":"Permanent control weather (6th level). Mächtige Wetterkontrolle.","gamePhase":"late","isOp":false,"opNote":"","tags":["utility","weather","environment"],"requiresStaff":null,"spellEquivalent5e":"control weather","removable":true},{"name":"Oaken Guardian","originalPrice3e":33000,"category":"security","description":"Ein Baum, der sich in einen Treant verwandelt.","flavorText":"Ein scheinbar gewöhnlicher Eichenbaum – bis jemand das Triggerwort spricht. Der Baum transformiert in einen Treant und erfüllt seinen Auftrag. Wird er getötet, ist er verloren.","mechanicalEffect5e":"Ein großer Baum, der sich bei einem 11-Wort-Trigger in einen Treant (siehe Monster Manual) verwandelt. Muss innerhalb von 90m von etwas Beschützenswertem stehen. Kehrt nach Erfüllung der Aufgabe zum Baum zurück. Bei Tod: Dauerhaft zerstört. Bei Schaden: Heilt normal.","price5e":33000,"pricingRationale":"Permanent liveoak (6th level druid). Sehr starker Beschützer.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","guardian","nature"],"requiresStaff":null,"spellEquivalent5e":"liveoak","removable":false},{"name":"Orb of Pleasant Breezes","originalPrice3e":33000,"category":"utility","description":"Ein Orb, der angenehmes Wetter erzeugt.","flavorText":"Das Gegenstück zum Cloudgathering Orb: angenehmes Wetter das ganze Jahr, Kilometer weit.","mechanicalEffect5e":"Erzeugt permanent angenehmes, mildes Wetter in 3 km Radius. control weather erfordert einen opposed level check.","price5e":33000,"pricingRationale":"Permanent control weather (6th level). Gegenstück zum Cloudgathering Orb.","gamePhase":"late","isOp":false,"opNote":"","tags":["utility","weather","environment"],"requiresStaff":null,"spellEquivalent5e":"control weather","removable":true},{"name":"Prison of Blades","origin e Waffe. Wenn in Position versiegelt sie Decke und Boden gegen unerwünschte Besucher.","mechanicalEffect5e":"Eine 3m (10 ft) große Plattform, die sich mit 6m pro Runde auf- oder abbewegt. Trägt bis zu 900 kg (2000 lbs) plus Plattform. Bei Konflikten: Wisdom-Contest. Ideal als Frachtaufzug.","price5e":40000,"pricingRationale":"Permanent levitate (2nd level) mit erhöhter Kapazität. Höhere Caster Level = mehr Kapazität.","gamePhase":"late","isOp":false,"opNote":"","tags":["utility","movement","transport"],"requiresStaff":null,"spellEquivalent5e":"levitate (enhanced)","removable":false},{"name":"Table of Feasting","originalPrice3e":43200,"category":"residential","description":"Ein Tisch, der heroes' feast wirkt.","flavorText":"Ein prächtiges Festmahl erscheint auf Kommando. Die Gruppe braucht eine Stunde zum Essen – eine Unterbrechung ruiniert den Effekt.","mechanicalEffect5e":"Der Tisch (12 Plätze) produziert 3x täglich ein heroes' feast. Das Fest erfordert 1 Stunde, um vollständig verzehrt zu werden. Unterbrechung ruiniert den Effekt. Gewährt: 2d4+10 temp HP für 24h, Immunität gegen poison und frightened, Advantage auf Wisdom saves, und heilt alle Krankheiten.","price5e":43200,"pricingRationale":"Permanent heroes' feast (6th level). Sehr mächtig für Gruppenbuffs.","gamePhase":"late","isOp":true,"opNote":"Gratis heroes' feast 3x/Tag ist extrem stark. Empfehlung: Erfordert 1.000 GP Materialkomponenten pro Nutzung.","tags":["economic","food","buff"],"requiresStaff":null,"spellEquivalent5e":"heroes' feast","removable":true},{"name":"Bier of Resurrection","originalPrice3e":44500,"category":"magic","description":"Eine Steinplatte, die resurrection wirkt.","flavorText":"Selbst wer seit Jahrzehnten tot ist, kann zurückkehren – wenn ein Diamant bereitliegt und die Seele willig ist. Alterstod bleibt die einzige unüberwindbare Grenze.","mechanicalEffect5e":"Wirkt resurrection auf jeden Leichnam, der darauf gelegt wird, wenn ein Diamant im Wert von mindestens 500 GP über dem Herz uren beschützt.","flavorText":"Ein schwaches blaues Leuchten umgibt rechtmäßige Kreaturen. Chaotische Angreifer werden bei einem Treffer verlangsamt.","mechanicalEffect5e":"Rechtschaffene Kreaturen im Raum erhalten: +4 magischer Bonus auf die Rüstungsklasse, +4 auf alle Rettungswürfe, Vorteil auf Rettungswürfe gegen Zauber von chaotic-ausgerichteten Kreaturen, Schutz vor possession/mind control. Chaotic Kreaturen, die eine geschützte Kreatur im Nahkampf treffen, müssen einen Wisdom save (DC 22) machen oder sind slowed.","price5e":60000,"pricingRationale":"Permanent shield of law (8th level). Alignment-basierter Buff.","gamePhase":"late","isOp":true,"opNote":"Vorteil auf alle magischen Rettungswürfe + Schutz permanent ist sehr stark. Empfehlung: Vorteil auf Rettungswürfe + Proficiency Bonus als Bonus.","tags":["combat","buff","alignment"],"requiresStaff":null,"spellEquivalent5e":"shield of law","removable":false},{"name":"Prismatic Prison","originalPrice3e":60000,"category":"security","description":"Ein Raum, der von einer prismatic wall umgeben ist.","flavorText":"Eine prismatische Wand umgibt alle Außenflächen. Nur der Erschaffer passiert ungehindert – alle anderen erleiden sämtliche Ebenen nacheinander.","mechanicalEffect5e":"Der Raum ist von einer prismatic wall umgeben (siehe PHB). Blendet Kreaturen innerhalb von 6m (Konstitutions-Rettungswurf DC 22 oder geblendet für 1 Minute). Nur der Erschaffer kann ungehindert durchgehen. Andere leiden die vollen Effekte.","price5e":60000,"pricingRationale":"Permanent prismatic wall (8th level). Extrem starke defensive Falle.","gamePhase":"late","isOp":false,"opNote":"","tags":["security","trap","prismatic"],"requiresStaff":null,"spellEquivalent5e":"prismatic wall","removable":false},{"name":"Secure Chamber","originalPrice3e":60000,"category":"security","description":"Ein Raum, der komplett vor Scrying geschützt ist.","flavorText":"Keine Divination, kein Scrying, kein Miracle erreicht diesen Raum. Der ultimative sichere Ort
